[project]
name = "corlinman-hooks"
version = "0.1.0"
description = "Cross-cutting event bus — priority-tiered broadcast hooks with cooperative cancel."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_hooks"]
