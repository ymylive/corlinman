[project]
name = "corlinman-user-model"
version = "0.1.0"
description = "UserModel — distil per-user traits from session turns; expose {{user.*}} placeholders."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = [
    "aiosqlite>=0.20",
    "corlinman-providers",
]

[project.scripts]
corlinman-user-model = "corlinman_user_model.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_user_model"]

[tool.uv.sources]
corlinman-providers = { workspace = true }
