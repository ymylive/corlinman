[project]
name = "corlinman-subagent"
version = "0.1.0"
description = "Subagent supervisor — depth/concurrency/timeout caps for the parent reasoning loop's `subagent.spawn` tool. Python port of rust/crates/corlinman-subagent (no PyO3 — pure asyncio)."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = [
    "corlinman-hooks",
]

[tool.uv.sources]
corlinman-hooks = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_subagent"]
