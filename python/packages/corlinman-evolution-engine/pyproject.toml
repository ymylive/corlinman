[project]
name = "corlinman-evolution-engine"
version = "0.1.0"
description = "EvolutionEngine — reads evolution_signals, clusters, emits memory_op proposals."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = [
    "aiosqlite>=0.20",
]

[project.scripts]
corlinman-evolution-engine = "corlinman_evolution_engine.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_evolution_engine"]
