[project]
name = "corlinman-replay"
version = "0.1.0"
description = "Deterministic session replay primitive (Python port of the Rust corlinman-replay crate). Reads sessions.sqlite, reconstructs turn-by-turn transcripts ready for diff / dump."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = [
    "aiosqlite>=0.20",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_replay"]
