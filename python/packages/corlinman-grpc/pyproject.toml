[project]
name = "corlinman-grpc"
version = "0.1.0"
description = "Generated gRPC / protobuf stubs for corlinman (populated by scripts/gen-proto.sh)."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = [
    "grpcio>=1.67",
    "protobuf>=5.28",
]

[project.optional-dependencies]
dev = [
    "grpcio-tools>=1.67",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_grpc"]
