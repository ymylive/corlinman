description: >
  Proposal targets `merge_chunks:1,99` but chunk 99 was never indexed.
  The simulator must detect the missing target id and short-circuit to
  NoOp without partially merging — a half-applied merge would corrupt the
  surviving row's lineage. (Similarity-based "these chunks aren't
  duplicates so don't merge" routing belongs to a later wave that adds
  upstream similarity gating; W1-A's deterministic simulator only owns
  the data op, not the dup decision.)
