[project]
name = "corlinman-nodebridge"
version = "0.1.0"
description = "NodeBridge v1 protocol + stub WebSocket server. Python port of rust/crates/corlinman-nodebridge."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = [
    "websockets>=13",
    "pydantic>=2.10",
    "corlinman-hooks",
]

[tool.uv.sources]
corlinman-hooks = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_nodebridge"]
