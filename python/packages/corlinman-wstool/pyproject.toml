[project]
name = "corlinman-wstool"
version = "0.1.0"
description = "Distributed tool-execution protocol over WebSocket. Python port of rust/crates/corlinman-wstool."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = [
    "websockets>=13",
    "pydantic>=2.10",
    "httpx>=0.27",
    "corlinman-hooks",
]

[tool.uv.sources]
corlinman-hooks = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_wstool"]
