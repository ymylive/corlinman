[project]
name = "corlinman-auto-rollback"
version = "0.1.0"
description = "AutoRollback — watches recently-applied EvolutionProposals for metrics regression and auto-reverts via an Applier (Python port of the Rust corlinman-auto-rollback + corlinman-auto-rollback-cli crates)."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = [
    "aiosqlite>=0.20",
    "corlinman-evolution-store",
]

[project.scripts]
corlinman-auto-rollback = "corlinman_auto_rollback.cli:main"

[tool.uv.sources]
corlinman-evolution-store = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_auto_rollback"]
