[project]
name = "corlinman-memory-host"
version = "0.1.0"
description = "Unified memory-source interface (local-sqlite / remote-http / federated) for corlinman hybrid search."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = [
    "aiosqlite>=0.20",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_memory_host"]
