[project]
name = "corlinman-agent-brain"
version = "0.1.0"
description = "Agent Brain Memory Curator — post-session knowledge distillation, linking, and vault management."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = [
    "aiosqlite>=0.20",
    "corlinman-episodes",
 "corlinman-user-model",
    "corlinman-persona",
 "corlinman-goals",
]

[project.scripts]
corlinman-agent-brain = "corlinman_agent_brain.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_agent_brain"]

[tool.uv.sources]
corlinman-episodes = { workspace = true }
corlinman-user-model = { workspace = true }
corlinman-persona = { workspace = true }
corlinman-goals = { workspace = true }
