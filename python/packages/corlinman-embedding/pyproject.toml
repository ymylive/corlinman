[project]
name = "corlinman-embedding"
version = "0.1.0"
description = "Embedding router — local sentence-transformers pool or remote provider."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = [
    "httpx>=0.27",
    "structlog>=25.1",
    "pydantic>=2.10",
    "corlinman-providers",
]

[tool.uv.sources]
corlinman-providers = { workspace = true }

[project.optional-dependencies]
local = [
    "sentence-transformers>=3.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_embedding"]
