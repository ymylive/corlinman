[project]
name = "corlinman-server"
version = "0.1.0"
description = "grpc.aio server entrypoint for the corlinman Python AI plane."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = [
    "grpcio>=1.67",
    "structlog>=25.1",
    "python-json-logger>=3.2",
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
    "opentelemetry-exporter-otlp>=1.27",
    "aiosqlite>=0.20",
    "pydantic>=2.10",
    "croniter>=6.0",
    "click>=8.1",
    "argon2-cffi>=23.1",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "websockets>=13",
    "httpx>=0.27",
    "prometheus_client>=0.21",
    "watchdog>=5.0",
    "anyio>=4",
    "corlinman-agent",
    "corlinman-embedding",
    "corlinman-providers",
    "corlinman-grpc",
    "corlinman-hooks",
    "corlinman-replay",
    "tomli-w>=1.2.0",
]

[tool.uv.sources]
corlinman-agent = { workspace = true }
corlinman-embedding = { workspace = true }
corlinman-providers = { workspace = true }
corlinman-grpc = { workspace = true }
corlinman-hooks = { workspace = true }
corlinman-replay = { workspace = true }

[project.scripts]
corlinman-python-server = "corlinman_server.main:main"
corlinman = "corlinman_server.cli.main:main"
corlinman-gateway = "corlinman_server.gateway.lifecycle.entrypoint:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_server"]
