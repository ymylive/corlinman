// agent.proto — core bidirectional streaming between Rust gateway and Python agent.
//
// One `Agent.Chat` stream per client-facing chat completion / channel message.
// Lifecycle:
//   Client → ChatStart (first frame, required)
//   Server → TokenDelta* / ToolCall / AwaitingApproval / Usage
//   Client → ToolResult (in response to ToolCall) | ApprovalDecision | Cancel
//   Server → Done | ErrorInfo (terminal)
//
// Backpressure: Rust mpsc(16) ↔ Python asyncio.Queue(maxsize=16).
// Cancellation: `Cancel` frame or gRPC stream abort → CancellationToken cascade.

syntax = "proto3";

package corlinman.v1;

import "corlinman/v1/common.proto";

option optimize_for = SPEED;

service Agent {
  rpc Chat(stream ClientFrame) returns (stream ServerFrame);
}

// ---- Client → Server ----------------------------------------------------

message ClientFrame {
  oneof kind {
    ChatStart start = 1;
    ToolResult tool_result = 2;
    Cancel cancel = 3;
    ApprovalDecision approval = 4;
  }
}

message ChatStart {
  string model = 1;              // post-ModelRedirect
  repeated Message messages = 2;
  // JSON-encoded OpenAI-style tools array; the agent parses & injects into provider call.
  bytes tools_json = 3;
  string session_key = 4;
  ChannelBinding binding = 5;
  // Pre-computed placeholders {key -> value_json}; for callers that want to
  // bypass gateway-side context_assembler (e.g. scheduler replay).
  map<string, bytes> placeholders = 6;
  // Sampling overrides; zero = use provider default.
  float temperature = 7;
  uint32 max_tokens = 8;
  // Stream tokens? If false, the agent buffers and emits a single TokenDelta before Done.
  bool stream = 9;
  TraceContext trace = 10;
  // Provider-config override (JSON); passed verbatim to provider adapter.
  bytes provider_config_json = 11;
}

message ToolResult {
  string call_id = 1;
  bytes result_json = 2;         // zero-copy from PluginBridge
  bool is_error = 3;
  uint64 duration_ms = 4;
}

message Cancel {
  // Optional reason; "client_disconnect" | "timeout" | "user_abort" | …
  string reason = 1;
}

message ApprovalDecision {
  string call_id = 1;
  bool approved = 2;
  // Applied scope: "once" | "session" | "always"
  string scope = 3;
  // If approved=false, optional reason shown to the model.
  string deny_message = 4;
}

// ---- Server → Client ----------------------------------------------------

message ServerFrame {
  oneof kind {
    TokenDelta token = 1;
    ToolCall tool_call = 2;
    AwaitingApproval awaiting = 3;
    Usage usage = 4;
    Done done = 5;
    ErrorInfo error = 6;
  }
}

message TokenDelta {
  string text = 1;
  // Set when the provider emits a reasoning/thinking delta (anthropic, deepseek-r1).
  bool is_reasoning = 2;
  // Frame sequence number within the stream (monotonic, starts at 0).
  uint64 seq = 3;
}

message ToolCall {
  string call_id = 1;
  string plugin = 2;
  string tool = 3;
  bytes args_json = 4;
  uint64 seq = 5;
}

message AwaitingApproval {
  string call_id = 1;
  string plugin = 2;
  string tool = 3;
  bytes args_preview_json = 4;
  string reason = 5;
}

message Done {
  // Normalized finish reason (maps to FinishReason in llm.proto).
  string finish_reason = 1;      // "stop" | "length" | "tool_call" | "content_filter" | "error"
  Usage usage = 2;
  uint64 total_tokens_seen = 3;
  uint64 wall_time_ms = 4;
}
