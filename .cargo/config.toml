# Cargo build acceleration knobs.
#
# This file ships with corlinman-friendly defaults but stays minimal:
# nothing here should make a fresh `cargo build` fail. Linker /
# wrapper overrides are opt-in via env vars or per-host override
# files so cross-compile containers and CI runners don't trip over
# missing tools.
#
# Recommended one-time setup on a dev box (macOS or Linux):
#   cargo install sccache --locked
#   export RUSTC_WRAPPER=sccache             # add to ~/.zshrc
#   # Linux only, optional but worth it for the gateway crate:
#   sudo apt-get install -y mold clang
#   export RUSTFLAGS='-C link-arg=-fuse-ld=mold'
#
# See docs/dev/build-fast.md for the full guide.
#
# Why so few keys? Earlier revisions hard-coded `linker = "clang"` and
# `rustc-wrapper = "sccache"`, which broke first-time builds on hosts
# that didn't have those tools and broke cross-rs containers that
# don't carry clang. Lesson learnt: opt-in beats opt-out.
