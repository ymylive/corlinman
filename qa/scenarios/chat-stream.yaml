# QA scenario: /v1/chat/completions (SSE streaming).
#
# In-process router + scripted backend, asserted against the raw SSE bytes.

name: chat-stream-happy-path
description: |
  Streaming chat completion. The gateway must emit at least one SSE `data:`
  event carrying the mocked tokens and terminate with the `data: [DONE]`
  sentinel.

requires_live: false
kind: chat_http
chat_http:
  request:
    model: claude-sonnet-4-5
    stream: true
    messages:
      - role: user
        content: stream please
  frames:
    - kind: token
      text: "hello "
    - kind: token
      text: "world"
    - kind: done
      reason: stop
  expect:
    status: 200
    stream_fragments:
      - "data:"
      - "hello"
      - "world"
      - "data: [DONE]"
