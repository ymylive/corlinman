# QA scenario: /v1/chat/completions (non-streaming).
#
# Drives the axum router in-process with a scripted ChatBackend that replays
# two token frames + Done. No gRPC, no python — the runner is deterministic
# and offline-safe.

name: chat-nonstream-happy-path
description: |
  Scripted backend emits "hello " + "world" + Done. The gateway must collate
  those tokens into `choices[0].message.content = "hello world"` and flag
  finish_reason as `stop`.

requires_live: false
kind: chat_http
chat_http:
  request:
    model: claude-sonnet-4-5
    stream: false
    messages:
      - role: user
        content: say hello
  frames:
    - kind: token
      text: "hello "
    - kind: token
      text: "world"
    - kind: done
      reason: stop
  expect:
    status: 200
    json_contains:
      - path: object
        equals: chat.completion
      - path: choices.0.message.content
        contains: "hello world"
      - path: choices.0.finish_reason
        equals: stop
