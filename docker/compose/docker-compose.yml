# Main corlinman compose file.
# Usage:
#   cd docker/compose
#   docker compose up -d                          # main only
#   docker compose -f docker-compose.yml -f docker-compose.qq.yml --profile qq up -d
#   docker compose -f docker-compose.yml -f docker-compose.obs.yml --profile obs up -d

services:
  corlinman:
    image: ghcr.io/ymylive/corlinman:dev  # placeholder; not pushed
    build:
      context: ../../
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: corlinman
    restart: unless-stopped
    ports:
      - "6005:6005"
    env_file:
      - ../../.env
    environment:
      BIND: 0.0.0.0
      CORLINMAN_PY_ADDR: 127.0.0.1:50051
      CORLINMAN_DATA_DIR: /data
      # Without this, admin UI toggle-save fails with `config_path_unset`
      # — the gateway can dry-run but can't persist mutations back to disk.
      CORLINMAN_CONFIG: /data/config.toml
      CORLINMAN_UI_DIR: /app/ui-static
    command: ["/app/start.sh"]
    volumes:
      # Single-container supervisor: bootstrap py-config, start Python agent,
      # then exec the Rust gateway.
      - ../start.sh:/app/start.sh:ro
      # Data directory (config.toml / plugins/ / agents/ / knowledge/ / vector/ / logs/)
      - ~/.corlinman:/data
      # Docker socket for plugin sandbox (read-only; bollard uses it to spawn children)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6005/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - corlinman-net

networks:
  corlinman-net:
    driver: bridge
