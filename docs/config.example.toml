# corlinman config.toml — annotated example.
#
# Default path: $CORLINMAN_DATA_DIR/config.toml, falling back to
# ~/.corlinman/config.toml. `corlinman onboard` writes an initial version;
# `corlinman config {show,get,set,validate}` does safe edits. See
# docs/architecture.md §7 for the full data-dir layout.

# ---------------------------------------------------------------------------
# [server] — axum gateway listener + data-dir root.
# ---------------------------------------------------------------------------
[server]
port = 6005
bind = "0.0.0.0"
# Files (agents/, plugins/, knowledge/, vector/, logs/) all live under here.
data_dir = "~/.corlinman"

# ---------------------------------------------------------------------------
# [admin] — credentials for /admin/* routes (basic auth, argon2id hash).
# ---------------------------------------------------------------------------
[admin]
username = "admin"
# Generate via `corlinman onboard` (prompts for password) or
# `corlinman config set admin.password_hash '$argon2id$...'` (pre-hashed).
# password_hash = "$argon2id$v=19$m=19456,t=2,p=1$..."

# ---------------------------------------------------------------------------
# [providers.*] — at least one must have enabled = true with an api_key
# for the gateway to serve chats.
#
# api_key shapes:
#   { env = "ANTHROPIC_API_KEY" }   # value read from env at startup (preferred)
#   { value = "sk-..." }            # literal; redacted by `config show`
# ---------------------------------------------------------------------------
[providers.anthropic]
api_key = { env = "ANTHROPIC_API_KEY" }
enabled = true

[providers.openai]
api_key = { env = "OPENAI_API_KEY" }
base_url = "https://api.openai.com/v1"
enabled = false

# [providers.google]
# [providers.deepseek]
# [providers.qwen]
# [providers.glm]

# ---------------------------------------------------------------------------
# [models] — default + alias table (resolved before routing to providers).
# ---------------------------------------------------------------------------
[models]
default = "claude-sonnet-4-5"

[models.aliases]
smart = "claude-opus-4-7"
cheap = "claude-haiku-4-5-20251001"

# ---------------------------------------------------------------------------
# [channels.qq] — OneBot v11 forward-WS bridge. Disabled by default.
# ---------------------------------------------------------------------------
[channels.qq]
enabled = false
ws_url = "ws://127.0.0.1:3001"
# access_token = { env = "QQ_ACCESS_TOKEN" }
self_ids = []
# Per-group keyword overrides (empty means channel default applies).
# [channels.qq.group_keywords]
# "123456789" = ["bot", "help"]

# Token-bucket rate limits (Sprint 4 T2).
#   - Omitting the whole `[channels.qq.rate_limit]` section applies the
#     built-in defaults (group 20/min, sender 5/min).
#   - Inside the section, omitting a single field disables *that* dimension
#     (serde maps absent Option → None → "no check"). Set a value to enable.
#   - Token buckets refill linearly: capacity = n, refill = n/60 tokens/sec.
# Example (keep defaults): leave this block commented out.
# Example (disable per-sender, keep per-group at 30/min):
# [channels.qq.rate_limit]
# group_per_min = 30
# Example (disable both — not recommended):
# [channels.qq.rate_limit]
# (empty body — both fields absent → both disabled)

# ---------------------------------------------------------------------------
# [channels.telegram] — Telegram Bot API long-poll adapter (Sprint 4 T4).
# Disabled by default. Inbound via `getUpdates`, outbound via `sendMessage`;
# see `corlinman_channels::telegram::run_telegram_channel`.
# ---------------------------------------------------------------------------
[channels.telegram]
enabled = false
# bot_token = { env = "TELEGRAM_BOT_TOKEN" }
# Whitelist of chat ids (group or private). Empty list = all chats allowed.
allowed_chat_ids = []
# Case-insensitive substring filter applied to non-mention group messages.
# Empty list = no filter (dispatch-all in groups). Private chats bypass this.
keyword_filter = []
# When true, group messages are only forwarded if the bot is @mentioned
# (mention / text_mention entity targeting the bot). Private chats are
# unaffected.
require_mention_in_groups = false

# Token-bucket rate limits. Shape mirrors [channels.qq.rate_limit]; same
# semantics (omit section = defaults 20/min chat, 5/min sender; omit a
# single field = that dimension disabled).
# [channels.telegram.rate_limit]
# chat_per_min = 20
# sender_per_min = 5

# ---------------------------------------------------------------------------
# [rag] — hybrid retrieval knobs. See docs/architecture.md §5 (Vector service).
# ---------------------------------------------------------------------------
[rag]
embedding_model = "mxbai-embed-large"
top_k = 5
hybrid_bm25_weight = 1.0
hybrid_hnsw_weight = 1.0
rrf_k = 60.0

# Cross-encoder rerank on top of RRF (Sprint 3 T6). Disabled by default — the
# searcher keeps RRF's ordering. Flip `enabled = true` to route fused
# candidates through a cross-encoder before truncating to `top_k`.
#
# mode = "local"  → sentence-transformers cross-encoder in the embedding
#                   service (requires its [local] extra); set `model` to a
#                   HF id such as "BAAI/bge-reranker-v2-m3".
# mode = "remote" → HTTP rerank endpoint (cohere / siliconflow / compat).
#                   Set `api_base`, `api_key`, and `model` (provider id).
[rag.rerank]
enabled = false
mode = "local"
# model = "BAAI/bge-reranker-v2-m3"

# Remote example:
# [rag.rerank]
# enabled = true
# mode = "remote"
# model = "BAAI/bge-reranker-v2-m3"
# api_base = "https://api.siliconflow.cn/v1"
# api_key = { env = "SILICONFLOW_API_KEY" }

# ---------------------------------------------------------------------------
# [[approvals.rules]] — per-plugin / per-tool approval gate (Sprint 2 T3).
#
# Every `ToolCall` the agent emits is matched against this list BEFORE the
# plugin runtime sees it:
#
#   mode = "auto"   → pass through immediately (useful as an explicit allow).
#   mode = "prompt" → row lands in SQLite `pending_approvals`; the admin UI
#                     (/admin/approvals) shows it, and the tool call blocks
#                     until an operator clicks Approve / Deny or the gate's
#                     default TTL (5 minutes) elapses — the latter surfaces
#                     `approval_timeout` in the ToolResult payload.
#   mode = "deny"   → structured rejection sent back to the model; no plugin
#                     process ever spawns.
#
# Matching is most-specific-first:
#   1. rules with `plugin = X, tool = "X.write"` → only that tool
#   2. rules with `plugin = X` (no `tool = `)    → every tool on that plugin
#   3. no rule                                    → default-auto (pass)
#
# `allow_session_keys` ONLY applies to prompt rules: when the chat request's
# `session_key` is in the list the call short-circuits to approved without
# pinging the admin UI. Handy for trusted internal channels (scheduler jobs,
# server-to-server) while still gating human-facing channels.
# ---------------------------------------------------------------------------

# Example 1: prompt before any file-ops write reaches disk.
[[approvals.rules]]
plugin = "file-ops"
tool = "file-ops.write"
mode = "prompt"

# Example 2: hard-deny shell plugins entirely.
# [[approvals.rules]]
# plugin = "shell"
# mode = "deny"

# Example 3: prompt for shell except for the scheduler's trusted session key.
# [[approvals.rules]]
# plugin = "shell"
# mode = "prompt"
# allow_session_keys = ["scheduler:daily-brief", "scheduler:git-sync"]

# ---------------------------------------------------------------------------
# [[scheduler.jobs]] — cron-style background jobs (tokio-cron-scheduler).
# action = { type = "run_agent", prompt = "..." }
#        | { type = "run_tool",  plugin = "...", tool = "...", args = { ... } }
# ---------------------------------------------------------------------------
[[scheduler.jobs]]
name = "daily-brief"
cron = "0 8 * * *"
timezone = "Asia/Shanghai"
action = { type = "run_agent", prompt = "生成今日简报" }

# [[scheduler.jobs]]
# name = "weekly-reindex"
# cron = "0 3 * * 0"
# action = { type = "run_tool", plugin = "vector", tool = "vector.reindex", args = { collection = "docs" } }

# ---------------------------------------------------------------------------
# [logging] — tracing subscriber. file_rolling emits daily files under
# <data_dir>/logs/ in addition to stdout.
# ---------------------------------------------------------------------------
[logging]
level = "info"       # trace | debug | info | warn | error
format = "json"      # json | text
file_rolling = true

# ---------------------------------------------------------------------------
# [meta] — maintained by `corlinman config set` / `save`. Do not edit by hand.
# ---------------------------------------------------------------------------
# [meta]
# last_touched_version = "0.1.0"
# last_touched_at = "2026-04-20T08:00:00Z"
