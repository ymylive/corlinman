# corlinman config.toml — annotated example.
#
# Default path: $CORLINMAN_DATA_DIR/config.toml, falling back to
# ~/.corlinman/config.toml. `corlinman onboard` writes an initial version;
# `corlinman config {show,get,set,validate}` does safe edits. See
# docs/architecture.md §7 for the full data-dir layout.

# ---------------------------------------------------------------------------
# [server] — axum gateway listener + data-dir root.
# ---------------------------------------------------------------------------
[server]
port = 6005
bind = "0.0.0.0"
# Files (agents/, plugins/, knowledge/, vector/, logs/) all live under here.
data_dir = "~/.corlinman"

# ---------------------------------------------------------------------------
# [admin] — credentials for /admin/* routes (basic auth, argon2id hash).
# ---------------------------------------------------------------------------
[admin]
username = "admin"
# Generate via `corlinman onboard` (prompts for password) or
# `corlinman config set admin.password_hash '$argon2id$...'` (pre-hashed).
# password_hash = "$argon2id$v=19$m=19456,t=2,p=1$..."

# ---------------------------------------------------------------------------
# [providers.*] — at least one must have enabled = true with an api_key
# for the gateway to serve chats.
#
# api_key shapes:
#   { env = "ANTHROPIC_API_KEY" }   # value read from env at startup (preferred)
#   { value = "sk-..." }            # literal; redacted by `config show`
# ---------------------------------------------------------------------------
[providers.anthropic]
api_key = { env = "ANTHROPIC_API_KEY" }
enabled = true

[providers.openai]
api_key = { env = "OPENAI_API_KEY" }
base_url = "https://api.openai.com/v1"
enabled = false

# [providers.google]
# [providers.deepseek]
# [providers.qwen]
# [providers.glm]

# ---------------------------------------------------------------------------
# [models] — default + alias table (resolved before routing to providers).
# ---------------------------------------------------------------------------
[models]
default = "claude-sonnet-4-5"

[models.aliases]
smart = "claude-opus-4-7"
cheap = "claude-haiku-4-5-20251001"

# ---------------------------------------------------------------------------
# [channels.qq] — OneBot v11 forward-WS bridge. Disabled by default.
# ---------------------------------------------------------------------------
[channels.qq]
enabled = false
ws_url = "ws://127.0.0.1:3001"
# access_token = { env = "QQ_ACCESS_TOKEN" }
self_ids = []
# Per-group keyword overrides (empty means channel default applies).
# [channels.qq.group_keywords]
# "123456789" = ["bot", "help"]

# Token-bucket rate limits (Sprint 4 T2).
#   - Omitting the whole `[channels.qq.rate_limit]` section applies the
#     built-in defaults (group 20/min, sender 5/min).
#   - Inside the section, omitting a single field disables *that* dimension
#     (serde maps absent Option → None → "no check"). Set a value to enable.
#   - Token buckets refill linearly: capacity = n, refill = n/60 tokens/sec.
# Example (keep defaults): leave this block commented out.
# Example (disable per-sender, keep per-group at 30/min):
# [channels.qq.rate_limit]
# group_per_min = 30
# Example (disable both — not recommended):
# [channels.qq.rate_limit]
# (empty body — both fields absent → both disabled)

# ---------------------------------------------------------------------------
# [channels.telegram] — Telegram Bot API long-poll adapter (Sprint 4 T4).
# Disabled by default. Inbound via `getUpdates`, outbound via `sendMessage`;
# see `corlinman_channels::telegram::run_telegram_channel`.
# ---------------------------------------------------------------------------
[channels.telegram]
enabled = false
# bot_token = { env = "TELEGRAM_BOT_TOKEN" }
# Whitelist of chat ids (group or private). Empty list = all chats allowed.
allowed_chat_ids = []
# Case-insensitive substring filter applied to non-mention group messages.
# Empty list = no filter (dispatch-all in groups). Private chats bypass this.
keyword_filter = []
# When true, group messages are only forwarded if the bot is @mentioned
# (mention / text_mention entity targeting the bot). Private chats are
# unaffected.
require_mention_in_groups = false

# Token-bucket rate limits. Shape mirrors [channels.qq.rate_limit]; same
# semantics (omit section = defaults 20/min chat, 5/min sender; omit a
# single field = that dimension disabled).
# [channels.telegram.rate_limit]
# chat_per_min = 20
# sender_per_min = 5

# ---------------------------------------------------------------------------
# [rag] — hybrid retrieval knobs. See docs/architecture.md §5 (Vector service).
# ---------------------------------------------------------------------------
[rag]
embedding_model = "mxbai-embed-large"
top_k = 5
hybrid_bm25_weight = 1.0
hybrid_hnsw_weight = 1.0
rrf_k = 60.0

# Sprint 9 T-B3-BE5 — EPA re-ranking boost. When `epa_enabled = true`, the
# hybrid searcher multiplies each candidate's RRF score by the `dynamic_boost`
# derived from its `chunk_epa` cache row (populated by the Python backfill
# job `corlinman_agent.rag.epa_backfill`). Default `false` preserves
# byte-identical pre-B3-BE5 behaviour.
#
# `epa_base_tag_boost` feeds the `dynamic_boost` formula as the base
# multiplier; the final factor is clamped to `epa_boost_range = [min, max]`.
epa_enabled = false
epa_base_tag_boost = 1.0
epa_boost_range = [0.5, 2.5]

# Cross-encoder rerank on top of RRF (Sprint 3 T6). Disabled by default — the
# searcher keeps RRF's ordering. Flip `enabled = true` to route fused
# candidates through a cross-encoder before truncating to `top_k`.
#
# mode = "local"  → sentence-transformers cross-encoder in the embedding
#                   service (requires its [local] extra); set `model` to a
#                   HF id such as "BAAI/bge-reranker-v2-m3".
# mode = "remote" → HTTP rerank endpoint (cohere / siliconflow / compat).
#                   Set `api_base`, `api_key`, and `model` (provider id).
[rag.rerank]
enabled = false
mode = "local"
# model = "BAAI/bge-reranker-v2-m3"

# Remote example:
# [rag.rerank]
# enabled = true
# mode = "remote"
# model = "BAAI/bge-reranker-v2-m3"
# api_base = "https://api.siliconflow.cn/v1"
# api_key = { env = "SILICONFLOW_API_KEY" }

# ---------------------------------------------------------------------------
# [[approvals.rules]] — per-plugin / per-tool approval gate (Sprint 2 T3).
#
# Every `ToolCall` the agent emits is matched against this list BEFORE the
# plugin runtime sees it:
#
#   mode = "auto"   → pass through immediately (useful as an explicit allow).
#   mode = "prompt" → row lands in SQLite `pending_approvals`; the admin UI
#                     (/admin/approvals) shows it, and the tool call blocks
#                     until an operator clicks Approve / Deny or the gate's
#                     default TTL (5 minutes) elapses — the latter surfaces
#                     `approval_timeout` in the ToolResult payload.
#   mode = "deny"   → structured rejection sent back to the model; no plugin
#                     process ever spawns.
#
# Matching is most-specific-first:
#   1. rules with `plugin = X, tool = "X.write"` → only that tool
#   2. rules with `plugin = X` (no `tool = `)    → every tool on that plugin
#   3. no rule                                    → default-auto (pass)
#
# `allow_session_keys` ONLY applies to prompt rules: when the chat request's
# `session_key` is in the list the call short-circuits to approved without
# pinging the admin UI. Handy for trusted internal channels (scheduler jobs,
# server-to-server) while still gating human-facing channels.
# ---------------------------------------------------------------------------

# Example 1: prompt before any file-ops write reaches disk.
[[approvals.rules]]
plugin = "file-ops"
tool = "file-ops.write"
mode = "prompt"

# Example 2: hard-deny shell plugins entirely.
# [[approvals.rules]]
# plugin = "shell"
# mode = "deny"

# Example 3: prompt for shell except for the scheduler's trusted session key.
# [[approvals.rules]]
# plugin = "shell"
# mode = "prompt"
# allow_session_keys = ["scheduler:daily-brief", "scheduler:git-sync"]

# ---------------------------------------------------------------------------
# [[scheduler.jobs]] — cron-style background jobs. The `cron` field uses the
# 7-field `sec min hour day month weekday year` format (the `cron` crate's
# grammar — same as `corlinman doctor` validates).
#
# action variants:
#   { type = "run_agent", prompt = "..." }
#   { type = "run_tool",  plugin = "...", tool = "...", args = { ... } }
#   { type = "subprocess", command = "...", args = [...], timeout_secs = 600,
#                         working_dir = "...", env = { KEY = "val" } }
# ---------------------------------------------------------------------------
[[scheduler.jobs]]
name = "daily-brief"
cron = "0 0 8 * * * *"
timezone = "Asia/Shanghai"
action = { type = "run_agent", prompt = "生成今日简报" }

# Phase 2 wave 2-B: run the Python EvolutionEngine once a day at 03:00 UTC.
# Stdout/stderr fold into tracing; exit ≠ 0 emits the `engine.run.failed`
# hook event so the EvolutionObserver records it as a signal.
[[scheduler.jobs]]
name = "evolution_engine"
cron = "0 0 3 * * * *"
action = { type = "subprocess", command = "corlinman-evolution-engine", args = ["run-once"], timeout_secs = 600, working_dir = "/data", env = { CORLINMAN_EVOLUTION_DB = "/data/evolution.sqlite", CORLINMAN_KB_DB = "/data/kb.sqlite" } }

# Phase 3 wave 1-A: run the Rust ShadowTester 30 min after the engine so
# any proposals the engine just filed get shadow-tested before the
# operator sees them in the approval queue. The binary itself is a
# no-op (exit 1 + clear log) when `[evolution.shadow].enabled = false`,
# so leaving this job wired but the master switch off is a safe default.
[[scheduler.jobs]]
name = "shadow_tester"
cron = "0 30 3 * * * *"
action = { type = "subprocess", command = "corlinman-shadow-tester", args = ["run-once", "--config", "/data/config.toml"], timeout_secs = 600, working_dir = "/data", env = { CORLINMAN_DATA_DIR = "/data" } }

# Phase 3 wave 1-B: AutoRollback monitor runs another 30 min after the
# shadow_tester so any approve+apply that landed in the operator review
# loop has had time to settle and emit signals. The binary itself is a
# no-op (exit 1 + clear log) when `[evolution.auto_rollback].enabled =
# false` — wiring the cron job while leaving the master switch off is
# safe and lets operators flip it on without a config-edit + redeploy.
[[scheduler.jobs]]
name = "auto_rollback"
cron = "0 0 4 * * * *"
action = { type = "subprocess", command = "corlinman-auto-rollback", args = ["run-once", "--config", "/data/config.toml"], timeout_secs = 600, working_dir = "/data", env = { CORLINMAN_DATA_DIR = "/data" } }

# Phase 3 wave 3-A: chunk-decay consolidation job. Runs another hour
# after the auto_rollback monitor so any in-flight reverts are settled
# before we file new memory_op proposals targeting `consolidate_chunk:<id>`.
# The CLI is a no-op (clear log line, exit 0) when
# `[memory.consolidation].enabled = false`.
[[scheduler.jobs]]
name = "memory_consolidation"
cron = "0 0 5 * * * *"
action = { type = "subprocess", command = "corlinman-evolution-engine", args = ["consolidate-once", "--config", "/data/config.toml"], timeout_secs = 600, working_dir = "/data", env = { CORLINMAN_DATA_DIR = "/data" } }

# Phase 3 wave 1-C: per-week / per-kind cap on EvolutionEngine proposal
# filing. The Python engine reads this same TOML via `--budget-config`
# (passed by the scheduler). When `enabled = false` the engine behaves
# exactly like Phase 2 — no skip, no signal, no UI gating; flip on once
# you've trued up `weekly_total` to your environment's signal volume.
# The UI's `/admin/evolution/budget` endpoint serves the live snapshot
# either way so operators can preview the gauge before opting in.
[evolution.budget]
enabled       = false
weekly_total  = 15

[evolution.budget.per_kind]
memory_op       = 5
skill_update    = 3
agent_card      = 5
prompt_template = 1
tool_policy     = 1
new_skill       = 2
tag_rebalance   = 3
retry_tuning    = 3

# [[scheduler.jobs]]
# name = "weekly-reindex"
# cron = "0 0 3 * * 0 *"
# action = { type = "run_tool", plugin = "vector", tool = "vector.reindex", args = { collection = "docs" } }

# ---------------------------------------------------------------------------
# [memory] — Phase 3 W3-A chunk decay + consolidation pipeline.
#
# Decay applies a half-life multiplier to chunk scores at read time —
# `last_recalled_at` is the age zero-point, `decay_score` is the stored
# multiplier the recall path boosts. Consolidation is the periodic job
# that promotes chunks whose decay_score has stayed above
# `promotion_threshold` into the immune `consolidated` namespace via
# the EvolutionApplier (so every kb mutation flows through the same
# audit pipeline as merge_chunks / delete_chunk).
# ---------------------------------------------------------------------------
[memory.decay]
enabled         = true
half_life_hours = 168.0   # 1 week
floor_score     = 0.05    # never decay below this multiplier
recall_boost    = 0.3     # bump on recall, capped at 1.0

[memory.consolidation]
enabled                = true
schedule               = "0 0 5 * * * *"  # 05:00 UTC daily
promotion_threshold    = 0.65
max_promotions_per_run = 50

# ---------------------------------------------------------------------------
# [logging] — tracing subscriber. file_rolling emits daily files under
# <data_dir>/logs/ in addition to stdout.
# ---------------------------------------------------------------------------
[logging]
level = "info"       # trace | debug | info | warn | error
format = "json"      # json | text
file_rolling = true

# ---------------------------------------------------------------------------
# [hooks] — in-process hook bus. `capacity` bounds the fan-out queue; set
# `enabled = false` to short-circuit dispatch while keeping handlers registered.
# ---------------------------------------------------------------------------
[hooks]
capacity = 1024
enabled = true

# ---------------------------------------------------------------------------
# [skills] — filesystem skill bundles discovered under `dir` (relative to
# data_dir). `autoload = true` indexes them at startup.
#
# Sample skills ship alongside this file:
#   skills/web_search.md   — openclaw-shaped, requires providers.brave.api_key
#   skills/code_review.md  — requires git on PATH
#   skills/memory.md       — no external requires
# See docs/guides/skills-and-agents.md for authoring notes.
# ---------------------------------------------------------------------------
[skills]
dir = "skills"
autoload = true

# ---------------------------------------------------------------------------
# [variables] — TVStxt variable stores. Paths are relative to data_dir;
# `hot_reload = true` watches each directory for changes.
#
# Sample content:
#   TVStxt/tar/CurrentProject.txt → {{TarCurrentProject}}
#   TVStxt/tar/HouseStyle.txt     → {{TarHouseStyle}}
#   TVStxt/sar/SarPrompt1.txt     → {{SarPrompt1}} gated on env SarModel1
#   TVStxt/fixed/README.md        — placeholder; on-disk fixed tier is TODO.
# ---------------------------------------------------------------------------
[variables]
tar_dir = "TVStxt/tar"
var_dir = "TVStxt/var"
sar_dir = "TVStxt/sar"
fixed_dir = "TVStxt/fixed"
hot_reload = true

# ---------------------------------------------------------------------------
# [agents] — character-card / {{角色}} registry. `single_agent_gate = true`
# enforces "first expansion wins" semantics inside a single prompt.
#
# Sample cards:
#   agents/mentor.yaml     — senior-dev mentor, Socratic method
#   agents/researcher.yaml — cited summaries, web.search + web.fetch
#   agents/editor.yaml     — prose editor, preserves author voice
# ---------------------------------------------------------------------------
[agents]
dir = "agents"
single_agent_gate = true

# ---------------------------------------------------------------------------
# [tools.block] — dual-track tool invocation. When enabled, agents may emit
# tool calls as `<<<[TOOL_REQUEST]>>>` structured blocks in addition to the
# OpenAI function-call format. Agents that don't advertise the block protocol
# fall back to function-calling when `fallback_to_function_call = true`.
# ---------------------------------------------------------------------------
[tools.block]
enabled = false
fallback_to_function_call = true

# ---------------------------------------------------------------------------
# [telegram.webhook] — webhook-mode Telegram adapter. Empty public_url ⇒
# webhook disabled (the long-poll adapter at [channels.telegram] is
# independent). `secret_token` is echoed by Telegram in
# `X-Telegram-Bot-Api-Secret-Token` so the handler can authenticate inbound.
# ---------------------------------------------------------------------------
[telegram.webhook]
public_url = ""
secret_token = ""
drop_updates_on_reconnect = false

# ---------------------------------------------------------------------------
# [vector.tags] — opt-in v6 hierarchical tag tree. With
# `hierarchy_enabled = true`, tags can be dotted paths (`a.b.c`) and queries
# match prefix subtrees up to `max_depth` deep.
# ---------------------------------------------------------------------------
[vector.tags]
hierarchy_enabled = false
max_depth = 6

# ---------------------------------------------------------------------------
# [wstool] — local WebSocket tool-bus. `bind` defaults to loopback; if you
# flip it to a non-loopback address, `corlinman config validate` requires
# `auth_token` to be set.
# ---------------------------------------------------------------------------
[wstool]
bind = "127.0.0.1:18790"
auth_token = ""
heartbeat_secs = 15

# ---------------------------------------------------------------------------
# [canvas] — host canvas endpoint (code / diagram preview). Off by default;
# `session_ttl_secs` bounds the per-session scratch retention.
# ---------------------------------------------------------------------------
[canvas]
host_endpoint_enabled = false
session_ttl_secs = 1800

# ---------------------------------------------------------------------------
# [nodebridge] — Node.js worker bridge listener. `accept_unsigned` reserves
# future signed-payload verification; keep it false in production.
# ---------------------------------------------------------------------------
[nodebridge]
listen = "127.0.0.1:18788"
accept_unsigned = false

# ---------------------------------------------------------------------------
# [meta] — maintained by `corlinman config set` / `save`. Do not edit by hand.
# ---------------------------------------------------------------------------
# [meta]
# last_touched_version = "0.1.0"
# last_touched_at = "2026-04-20T08:00:00Z"
