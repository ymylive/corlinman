# Cross configuration.
#
# corlinman-proto / tonic-build invoke `protoc` from inside the
# cross compile container, so we need it preinstalled. The default
# cross images are Ubuntu-based, so apt-get is available.

[build.env]
# Pass through git refs so build scripts that stamp version info
# (e.g. for the gateway's --version output) can read them.
passthrough = ["GIT_SHA", "GIT_TAG"]

[target.x86_64-unknown-linux-musl]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update",
    "apt-get install -y --no-install-recommends protobuf-compiler",
]

[target.aarch64-unknown-linux-musl]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update",
    "apt-get install -y --no-install-recommends protobuf-compiler",
]
