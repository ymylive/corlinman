# cargo-deny policy for the corlinman workspace.
#
# Run locally:  cargo install cargo-deny --locked && cargo deny check
# CI invocation is `continue-on-error: true` for now — this is a safety net,
# not a hard gate, while the crate graph is still churning (see M7 plan).

[graph]
# Only check the host target; cross-compile noise is not useful for policy.
all-features = false
no-default-features = false

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "0BSD",
    "Zlib",
    "MPL-2.0",
    # `webpki-roots` (transitive via reqwest/tokio-tungstenite → rustls)
    # is licensed under CDLA-Permissive-2.0, a permissive license
    # endorsed by the Linux Foundation. No copyleft, attribution-only
    # — equivalent in practice to MIT for our purposes.
    "CDLA-Permissive-2.0",
]

[bans]
# Multiple versions of the same crate are usually a transitive-dep artefact
# rather than a policy violation; warn so we can track regressions.
multiple-versions = "warn"
# Workspace-internal sibling deps are declared as `path = "../foo"` with
# no version constraint — Cargo treats those as a `*` requirement, which
# cargo-deny then flags as a wildcard. The targeted exemption
# (`allow-wildcard-paths = true`) only applies to crates marked
# `publish = false`, and we deliberately do not mark every workspace
# member private (some are intended to ship). All workspace members
# resolve to `path` deps anyway, and the only registry we trust is
# enforced via `[sources]` below — so allowing wildcards here is no
# practical loosening of supply-chain posture. A spot check confirmed
# zero registry-version wildcards in any crate Cargo.toml.
wildcards = "allow"

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# All ignores below are tracked under the M7 dep-stabilisation work —
# this file is the authoritative list of "known-but-deferred" advisories
# so CI stays green while we drive the upstream fixes / forks. Each
# entry must carry a one-line justification.
ignore = [
    # ── Unmaintained / unsound; no safe upgrade exists ────────────────
    # yaml-rust 0.4.5 — pulled in by `syntect 5.x` via its
    # `yaml-load` feature (transitively required by `default-syntaxes`,
    # which we need for the canvas highlighter). syntect upstream has
    # not migrated to `yaml-rust2`; revisit when they do.
    { id = "RUSTSEC-2024-0320", reason = "yaml-rust unmaintained; syntect 5.x has no migration path off it yet" },
    # backoff 0.4.0 — used by corlinman-agent-client. Stable, no CVE,
    # just no longer maintained. Migration to `backon` tracked in M7.
    { id = "RUSTSEC-2025-0012", reason = "backoff unmaintained; migration to `backon` tracked in M7" },
    # bincode 1.3.3 — pulled in transitively by deno_core; the bincode
    # team explicitly considers 1.3.3 feature-complete. We have no
    # direct dep, removal is gated on deno_core moving off it.
    { id = "RUSTSEC-2025-0141", reason = "bincode unmaintained but transitive via deno_core; nothing actionable on our side" },
    # instant 0.1.13 — transitive (commonly via `parking_lot` /
    # `backoff`); upstream replacements (web-time) are in flight in
    # the broader ecosystem. No CVE.
    { id = "RUSTSEC-2024-0384", reason = "instant unmaintained; transitive only, no CVE" },
    # paste 1.0.15 — proc-macro, transitive. Many crates still use it,
    # ecosystem-wide migration off it is a long tail.
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained; transitive proc-macro, no CVE" },
    # proc-macro-error 1.x — transitive (commonly via clap_derive/
    # structopt-derive ancestry). Replaced by proc-macro-error2 in
    # newer dep stacks; can drop once all transitive users upgrade.
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error unmaintained; transitive only" },
    # lru 0.12.5 — `IterMut` Stacked-Borrows unsoundness. We do not
    # use `IterMut` anywhere in canvas; bumping to 0.16 requires a
    # canvas API change tracked in M7.
    { id = "RUSTSEC-2026-0002", reason = "lru IterMut unsound — we do not call IterMut; upgrade to 0.16 tracked in M7" },

    # ── Vulnerabilities with available upgrades, deferred to M7 ───────
    # Each of these has a safe upgrade but bumping requires touching
    # Cargo.toml of multiple crates and re-resolving the lock; that
    # work is sequenced separately so this CI safety-net stays green.
    # protobuf 2.28.0 → 3.7.2 — transitive via prometheus 0.13.
    # Requires bumping prometheus, which is a breaking-API jump.
    { id = "RUSTSEC-2024-0437", reason = "protobuf 2.x recursion crash; transitive via prometheus 0.13 which has no release pulling protobuf 3.x — bump tracked in M7" },
    # sqlx 0.7.4 → 0.8.x — used by corlinman-auto-rollback. 0.8 is a
    # breaking upgrade for the offline-query / macros API across 11
    # workspace crates; sequenced separately in M7.
    { id = "RUSTSEC-2024-0363", reason = "sqlx <0.8.1 protocol-cast bug; 0.8 upgrade is breaking across 11 workspace crates, tracked in M7" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
