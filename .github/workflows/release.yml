name: release

# Triggered on annotated v* tags (and manual dispatch). Three jobs run
# in parallel — operator's only step is `git tag vX.Y.Z && git push --tags`.
#
#   1. build-x86_64-linux:    cargo build on ubuntu-latest (gcc 13 +
#                             binutils 2.42, glibc 2.39); tarball
#                             attached to the GitHub Release.
#   2. build-aarch64-darwin:  cargo build on macos-latest (Apple Silicon
#                             native, since 2024); tarball attached.
#   3. build-and-push-image:  docker build via docker/Dockerfile,
#                             push to ghcr.io as :vX.Y.Z + :latest + :dev.
#
# The aarch64-linux-gnu prebuilt is intentionally disabled (see
# build-aarch64-linux-disabled below for the multi-attempt rationale).
# Operators on Graviton/Ampere build from source.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-x86_64-linux:
    name: Build x86_64-linux-gnu (manylinux_2_28, portable)
    # Build inside the manylinux_2_28 container so the resulting binary
    # links against glibc 2.28 (AlmaLinux 8). That's portable to every
    # currently-supported Linux distro that matters:
    #   - Debian 11 / 12 / 13  (glibc 2.31 / 2.36 / 2.38+)
    #   - Ubuntu 20.04 / 22.04 / 24.04 (glibc 2.31 / 2.35 / 2.39)
    #   - RHEL 8 / 9 / 10  (glibc 2.28 / 2.34 / 2.39)
    # The container also ships gcc 14 + binutils 2.40+, which together
    # are new enough to compile numkong's AVX-512 / AMX-FP16 intrinsics
    # — that's why we can't just downgrade the runner image to ubuntu-22.04
    # (gcc 11 / binutils 2.38 don't know `tdpfp16ps` etc.).
    #
    # End result: ONE binary that works for both deploy paths —
    # `install.sh --mode native` (extract + run) AND inside the ghcr
    # runtime image. Operators on old + new distros all get a working
    # prebuilt; the docker image is now a convenience, not a hard
    # requirement.
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target-x86_64-linux-gnu
          key: cargo-x86_64-manylinux_2_28-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-x86_64-manylinux_2_28-

      - name: Install Rust 1.95.0
        run: |
          # manylinux ships rustup-init via system; reinstall to ensure 1.95.0.
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain 1.95.0 --profile minimal \
                --component rustfmt,clippy
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install build prerequisites
        run: |
          # manylinux_2_28 is AlmaLinux 8 base; protobuf-compiler lives in EPEL.
          dnf install -y protobuf-compiler protobuf-devel || \
            dnf install -y --enablerepo=powertools,epel protobuf-compiler protobuf-devel

      - name: Resolve version + tag
        id: meta
        run: |
          VERSION=$(grep -E '^version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        run: |
          export CARGO_TARGET_DIR=target-x86_64-linux-gnu
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo build --release --target x86_64-unknown-linux-gnu \
            --bin corlinman-gateway \
            --bin corlinman \
            --bin corlinman-auto-rollback \
            --bin corlinman-shadow-tester

      - name: Verify glibc baseline
        # Sanity check: the binary must NOT require any glibc symbol
        # newer than 2.28. If it does, the manylinux image leaked a
        # post-2.28 dep into the link and we ship an unportable artifact.
        run: |
          for b in corlinman-gateway corlinman corlinman-auto-rollback corlinman-shadow-tester; do
            highest=$(objdump -T "target-x86_64-linux-gnu/x86_64-unknown-linux-gnu/release/$b" \
              | grep -oE 'GLIBC_[0-9]+\.[0-9]+(\.[0-9]+)?' \
              | sort -V | tail -1 || true)
            echo "$b -> max glibc symbol: ${highest:-none}"
            if [ -n "$highest" ]; then
              major=$(echo "$highest" | sed -E 's/GLIBC_([0-9]+)\..*/\1/')
              minor=$(echo "$highest" | sed -E 's/GLIBC_[0-9]+\.([0-9]+).*/\1/')
              if [ "$major" -gt 2 ] || { [ "$major" -eq 2 ] && [ "$minor" -gt 28 ]; }; then
                echo "::error::$b requires $highest which exceeds the manylinux_2_28 baseline (glibc 2.28)"
                exit 1
              fi
            fi
          done

      - name: Package
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TARGET="x86_64-unknown-linux-gnu"
          OUTDIR="dist/corlinman-${VERSION}-${TARGET}"
          mkdir -p "$OUTDIR"
          for b in corlinman-gateway corlinman corlinman-auto-rollback corlinman-shadow-tester; do
            cp "target-x86_64-linux-gnu/${TARGET}/release/${b}" "$OUTDIR/"
            strip "$OUTDIR/$b" 2>/dev/null || true
          done
          cat > "$OUTDIR/README" <<EOF
          corlinman ${VERSION}
          target: ${TARGET}
          built on: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          source: ${{ github.server_url }}/${{ github.repository }}/tree/${{ github.sha }}
          EOF
          ARCHIVE="corlinman-${VERSION}-${TARGET}.tar.gz"
          (cd dist && tar -czf "$ARCHIVE" "$(basename "$OUTDIR")")
          (cd dist && shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256")
          ls -lh dist/

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/corlinman-*-x86_64-unknown-linux-gnu.tar.gz
            dist/corlinman-*-x86_64-unknown-linux-gnu.tar.gz.sha256
          fail_on_unmatched_files: true

      - name: Upload as workflow artifact (when manually dispatched)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: corlinman-x86_64-unknown-linux-gnu
          path: |
            dist/corlinman-*-x86_64-unknown-linux-gnu.tar.gz
            dist/corlinman-*-x86_64-unknown-linux-gnu.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # macOS aarch64 native build. Replaces the maintainer-side
  # `scripts/build-release.sh aarch64-apple-darwin` + manual
  # `gh release upload` step from the v0.6.x cycle. macos-latest is
  # Apple-Silicon since GitHub Actions migrated in 2024, so this is a
  # native cargo build (no cross / Rosetta involved).
  #
  # Cost note: macos-* minutes bill at 10x ubuntu — only runs on v* tag
  # push (and workflow_dispatch), not on every PR.
  # ---------------------------------------------------------------------------
  build-aarch64-darwin:
    name: Build aarch64-apple-darwin (native)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target-aarch64-darwin
          key: cargo-aarch64-darwin-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-aarch64-darwin-${{ runner.os }}-

      - name: Install build prerequisites
        run: brew install protobuf

      - name: Resolve version + tag
        id: meta
        run: |
          VERSION=$(grep -E '^version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        run: |
          export CARGO_TARGET_DIR=target-aarch64-darwin
          cargo build --release --target aarch64-apple-darwin \
            --bin corlinman-gateway \
            --bin corlinman \
            --bin corlinman-auto-rollback \
            --bin corlinman-shadow-tester

      - name: Package
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TARGET="aarch64-apple-darwin"
          OUTDIR="dist/corlinman-${VERSION}-${TARGET}"
          mkdir -p "$OUTDIR"
          for b in corlinman-gateway corlinman corlinman-auto-rollback corlinman-shadow-tester; do
            cp "target-aarch64-darwin/${TARGET}/release/${b}" "$OUTDIR/"
            strip "$OUTDIR/$b" 2>/dev/null || true
          done
          cat > "$OUTDIR/README" <<EOF
          corlinman ${VERSION}
          target: ${TARGET}
          built on: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          source: ${{ github.server_url }}/${{ github.repository }}/tree/${{ github.sha }}
          EOF
          ARCHIVE="corlinman-${VERSION}-${TARGET}.tar.gz"
          (cd dist && tar -czf "$ARCHIVE" "$(basename "$OUTDIR")")
          (cd dist && shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256")
          ls -lh dist/

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/corlinman-*-aarch64-apple-darwin.tar.gz
            dist/corlinman-*-aarch64-apple-darwin.tar.gz.sha256
          fail_on_unmatched_files: true

      - name: Upload as workflow artifact (when manually dispatched)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: corlinman-aarch64-apple-darwin
          path: |
            dist/corlinman-*-aarch64-apple-darwin.tar.gz
            dist/corlinman-*-aarch64-apple-darwin.tar.gz.sha256

  # aarch64-linux-gnu cross-compile is currently disabled. numkong (a
  # transitive dep of usearch) emits NEON SDOT intrinsics under
  # always_inline + target("dotprod") attributes that the
  # aarch64-linux-gnu-gcc cross compiler (any GCC version we tried, up
  # through 13 on cross-rs :edge) can't satisfy when the caller is
  # compiled with the default `-march=armv8-a` baseline. Six runs
  # exhausted: stock GCC 9, ppa GCC 11 (package not published for
  # focal arm64), and :edge with GCC 13 all hit the same
  # "target specific option mismatch" failure. Operators on Graviton /
  # Ampere should build from source (`cargo install --path ...`) until
  # we either patch numkong upstream or pin a usearch version without
  # this dependency. x86_64 + macOS prebuilts still ship.
  # ---------------------------------------------------------------------------
  # docker image: build runtime via docker/Dockerfile + push to ghcr.io.
  # Tagged on every v* release. Tags written:
  #   - ghcr.io/<repo>:vX.Y.Z   (immutable per release)
  #   - ghcr.io/<repo>:latest   (mutable; tracks newest tag)
  #   - ghcr.io/<repo>:dev      (mutable; the channel the operator's
  #                              docker-compose pulls from)
  # The dev tag mirrors the latest tagged release so existing operator
  # `docker compose pull && docker compose up -d` flows just work.
  # ---------------------------------------------------------------------------
  build-and-push-image:
    name: Build + push docker image (ghcr.io)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO_LOWER="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO_LOWER" >> "$GITHUB_OUTPUT"

      - name: Build + push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.repo }}:latest
            ghcr.io/${{ steps.meta.outputs.repo }}:dev

  build-aarch64-linux-disabled:
    name: Build aarch64-linux-gnu (cross from amd64)
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target-aarch64-linux-gnu
          key: cargo-aarch64-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-aarch64-${{ runner.os }}-

      - name: Install cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Resolve version + tag
        id: meta
        run: |
          VERSION=$(grep -E '^version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Cross-build release binaries
        # No QEMU emulation issues here: the runner is native amd64,
        # cross's container is amd64, only the target binary is arm64.
        run: |
          export CARGO_TARGET_DIR=target-aarch64-linux-gnu
          cross build --release --target aarch64-unknown-linux-gnu \
            --bin corlinman-gateway \
            --bin corlinman \
            --bin corlinman-auto-rollback \
            --bin corlinman-shadow-tester

      - name: Package
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TARGET="aarch64-unknown-linux-gnu"
          OUTDIR="dist/corlinman-${VERSION}-${TARGET}"
          mkdir -p "$OUTDIR"
          for b in corlinman-gateway corlinman corlinman-auto-rollback corlinman-shadow-tester; do
            cp "target-aarch64-linux-gnu/${TARGET}/release/${b}" "$OUTDIR/"
            # Use the cross-build's strip (aarch64-linux-gnu-strip) so
            # the host amd64 strip doesn't refuse the foreign arch.
            aarch64-linux-gnu-strip "$OUTDIR/$b" 2>/dev/null \
              || sudo apt-get install -y --no-install-recommends binutils-aarch64-linux-gnu \
              && aarch64-linux-gnu-strip "$OUTDIR/$b" 2>/dev/null \
              || true
          done
          cat > "$OUTDIR/README" <<EOF
          corlinman ${VERSION}
          target: ${TARGET}
          built on: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          source: ${{ github.server_url }}/${{ github.repository }}/tree/${{ github.sha }}
          EOF
          ARCHIVE="corlinman-${VERSION}-${TARGET}.tar.gz"
          (cd dist && tar -czf "$ARCHIVE" "$(basename "$OUTDIR")")
          (cd dist && shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256")
          ls -lh dist/

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/corlinman-*-aarch64-unknown-linux-gnu.tar.gz
            dist/corlinman-*-aarch64-unknown-linux-gnu.tar.gz.sha256
          fail_on_unmatched_files: true
