name: release

# Triggered on annotated v* tags (and manual dispatch). Two jobs:
#
#   1. build-x86_64-linux: compiles natively on ubuntu-latest
#      (amd64 runner, GCC modern enough for usearch's numkong
#      AVX-512 intrinsics), packages, uploads to the release.
#
#   2. upload-local-artifacts: attaches whatever the maintainer
#      pre-built locally (macOS + aarch64-linux-gnu from
#      `./scripts/build-release.sh`). Expected to live in
#      a committed `dist/` directory or be re-attached after-tag
#      via `gh release upload`. This job is a sanity check that
#      surfaces missing artifacts.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-x86_64-linux:
    name: Build x86_64-linux-gnu (native)
    # ubuntu-latest = 24.04 (gcc 13 + binutils 2.42) — needed for
    # numkong's AVX-512/AMX intrinsics. Resulting binary links against
    # glibc 2.39, so the prebuilt **does not load on Debian 12**
    # (glibc 2.36) via deploy/install.sh --mode native; for older
    # distros use --mode docker (the runtime image stays bookworm).
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target-x86_64-linux-gnu
          key: cargo-x86_64-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-x86_64-${{ runner.os }}-

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Resolve version + tag
        id: meta
        run: |
          VERSION=$(grep -E '^version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        run: |
          export CARGO_TARGET_DIR=target-x86_64-linux-gnu
          cargo build --release --target x86_64-unknown-linux-gnu \
            --bin corlinman-gateway \
            --bin corlinman \
            --bin corlinman-auto-rollback \
            --bin corlinman-shadow-tester

      - name: Package
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TARGET="x86_64-unknown-linux-gnu"
          OUTDIR="dist/corlinman-${VERSION}-${TARGET}"
          mkdir -p "$OUTDIR"
          for b in corlinman-gateway corlinman corlinman-auto-rollback corlinman-shadow-tester; do
            cp "target-x86_64-linux-gnu/${TARGET}/release/${b}" "$OUTDIR/"
            strip "$OUTDIR/$b" 2>/dev/null || true
          done
          cat > "$OUTDIR/README" <<EOF
          corlinman ${VERSION}
          target: ${TARGET}
          built on: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          source: ${{ github.server_url }}/${{ github.repository }}/tree/${{ github.sha }}
          EOF
          ARCHIVE="corlinman-${VERSION}-${TARGET}.tar.gz"
          (cd dist && tar -czf "$ARCHIVE" "$(basename "$OUTDIR")")
          (cd dist && shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256")
          ls -lh dist/

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/corlinman-*-x86_64-unknown-linux-gnu.tar.gz
            dist/corlinman-*-x86_64-unknown-linux-gnu.tar.gz.sha256
          fail_on_unmatched_files: true

      - name: Upload as workflow artifact (when manually dispatched)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: corlinman-x86_64-unknown-linux-gnu
          path: |
            dist/corlinman-*-x86_64-unknown-linux-gnu.tar.gz
            dist/corlinman-*-x86_64-unknown-linux-gnu.tar.gz.sha256

  # aarch64-linux-gnu cross-compile is currently disabled. numkong (a
  # transitive dep of usearch) emits NEON SDOT intrinsics under
  # always_inline + target("dotprod") attributes that the
  # aarch64-linux-gnu-gcc cross compiler (any GCC version we tried, up
  # through 13 on cross-rs :edge) can't satisfy when the caller is
  # compiled with the default `-march=armv8-a` baseline. Six runs
  # exhausted: stock GCC 9, ppa GCC 11 (package not published for
  # focal arm64), and :edge with GCC 13 all hit the same
  # "target specific option mismatch" failure. Operators on Graviton /
  # Ampere should build from source (`cargo install --path ...`) until
  # we either patch numkong upstream or pin a usearch version without
  # this dependency. x86_64 + macOS prebuilts still ship.
  build-aarch64-linux-disabled:
    name: Build aarch64-linux-gnu (cross from amd64)
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target-aarch64-linux-gnu
          key: cargo-aarch64-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-aarch64-${{ runner.os }}-

      - name: Install cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Resolve version + tag
        id: meta
        run: |
          VERSION=$(grep -E '^version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Cross-build release binaries
        # No QEMU emulation issues here: the runner is native amd64,
        # cross's container is amd64, only the target binary is arm64.
        run: |
          export CARGO_TARGET_DIR=target-aarch64-linux-gnu
          cross build --release --target aarch64-unknown-linux-gnu \
            --bin corlinman-gateway \
            --bin corlinman \
            --bin corlinman-auto-rollback \
            --bin corlinman-shadow-tester

      - name: Package
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TARGET="aarch64-unknown-linux-gnu"
          OUTDIR="dist/corlinman-${VERSION}-${TARGET}"
          mkdir -p "$OUTDIR"
          for b in corlinman-gateway corlinman corlinman-auto-rollback corlinman-shadow-tester; do
            cp "target-aarch64-linux-gnu/${TARGET}/release/${b}" "$OUTDIR/"
            # Use the cross-build's strip (aarch64-linux-gnu-strip) so
            # the host amd64 strip doesn't refuse the foreign arch.
            aarch64-linux-gnu-strip "$OUTDIR/$b" 2>/dev/null \
              || sudo apt-get install -y --no-install-recommends binutils-aarch64-linux-gnu \
              && aarch64-linux-gnu-strip "$OUTDIR/$b" 2>/dev/null \
              || true
          done
          cat > "$OUTDIR/README" <<EOF
          corlinman ${VERSION}
          target: ${TARGET}
          built on: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          source: ${{ github.server_url }}/${{ github.repository }}/tree/${{ github.sha }}
          EOF
          ARCHIVE="corlinman-${VERSION}-${TARGET}.tar.gz"
          (cd dist && tar -czf "$ARCHIVE" "$(basename "$OUTDIR")")
          (cd dist && shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256")
          ls -lh dist/

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/corlinman-*-aarch64-unknown-linux-gnu.tar.gz
            dist/corlinman-*-aarch64-unknown-linux-gnu.tar.gz.sha256
          fail_on_unmatched_files: true
