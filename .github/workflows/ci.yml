name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Unified workspace gate. Each tool runs as its own job for parallelism so a
# slow rust-test doesn't block the python lint feedback loop. Commands here
# mirror the Makefile (`make lint` / `make test`) so CI cannot drift from
# local-dev. See docs/ci-status.md for per-job expectations.
jobs:
  # ---------------------------------------------------------------------------
  # Rust plane (fmt / clippy / nextest split into parallel jobs)
  # ---------------------------------------------------------------------------
  rust-fmt:
    name: rust-fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins the channel (currently 1.95.0) and components
      # (rustfmt, clippy); dtolnay/rust-toolchain@master honours that file so
      # workspace + CI never drift.
      - name: Install Rust (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  rust-clippy:
    name: rust-clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf-compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler pkg-config libssl-dev

      - name: Install Rust (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-ci
          cache-on-failure: true

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: rust-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf-compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler pkg-config libssl-dev

      - name: Install Rust (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-ci
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: cargo nextest run
        # --retries 2: SQLite tests in corlinman-vector / corlinman-memory-host
        # / corlinman-gateway have a residual catalog-cache race under nextest
        # parallelism on Linux runners that shows up as `(code: 1) no such
        # table: chunks`. The PR fixing the migration to use an isolated
        # single-conn pool collapsed most of the window; the retry handles
        # the leftover edge cases without masking deterministic bugs.
        run: cargo nextest run --workspace --retries 2

  # ---------------------------------------------------------------------------
  # Python plane (ruff / mypy / pytest split into parallel jobs)
  # ---------------------------------------------------------------------------
  py-ruff:
    name: py-ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: uv sync
        run: uv sync --dev

      - name: ruff check
        run: uv run ruff check .

  py-mypy:
    name: py-mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf-compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: uv sync
        run: uv sync --dev

      # Generated proto stubs are imported by the python plane; without them
      # mypy can't resolve corlinman_grpc symbols.
      - name: generate Python stubs
        run: bash scripts/gen-proto.sh

      - name: mypy
        run: uv run mypy .

  py-test:
    name: py-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf-compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: uv sync
        run: uv sync --dev

      - name: generate Python stubs
        run: bash scripts/gen-proto.sh

      - name: pytest (non-live)
        run: uv run pytest -m "not live_llm and not live_transport"

  # ---------------------------------------------------------------------------
  # UI plane (typecheck / lint / test split into parallel jobs)
  # ---------------------------------------------------------------------------
  ui-typecheck:
    name: ui-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm 9
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store dir
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm -C ui typecheck

  ui-lint:
    name: ui-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm 9
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store dir
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm -C ui lint

  ui-test:
    name: ui-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm 9
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store dir
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: test
        run: pnpm -C ui test

  # ---------------------------------------------------------------------------
  # Auxiliary gates (kept from the previous ci.yml; not part of the 9-job
  # core gate but still run on every PR + push to main).
  # ---------------------------------------------------------------------------
  proto-sync:
    name: proto-sync (generated stubs committed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf-compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: uv sync
        run: uv sync --dev

      - name: generate Python stubs
        run: bash scripts/gen-proto.sh

      # Scoped to the generated dir so unrelated dirty files in the workflow
      # runner (e.g. uv's .venv, pnpm cache) don't spuriously fail the job.
      - name: verify no drift
        run: git diff --exit-code python/packages/corlinman-grpc/src/corlinman_grpc/_generated/

  boundary-check:
    name: boundary-check (no cycles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf-compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler pkg-config libssl-dev

      - name: Install Rust (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-ci

      - name: Install cargo-modules
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-modules

      # `corlinman-gateway` has both lib and bin targets; cargo-modules needs
      # the target specified explicitly.
      - name: rust module graph (gateway lib)
        run: cargo modules structure --package corlinman-gateway --lib --no-fns

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: uv sync
        run: uv sync --dev

      # Python plane layering contract — see .importlinter at repo root.
      - name: python import-linter
        run: uv run lint-imports

  docker-build:
    name: docker-build (runtime target, dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: corlinman:ci

  # Advisory job; does not gate merges while the crate graph is churning.
  # Promoted to required once M7's dep-stabilisation work lands.
  cargo-deny:
    name: cargo-deny (licenses / advisories — advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo deny check
        run: cargo deny --all-features check

  # ---------------------------------------------------------------------------
  # Aggregator: a single required check that fans-in the 9 core gate jobs so
  # branch protection only needs one rule. Auxiliary jobs above run alongside
  # but are not fanned-in here.
  # ---------------------------------------------------------------------------
  gate:
    name: gate (all required checks)
    if: always()
    needs:
      - rust-fmt
      - rust-clippy
      - rust-test
      - py-ruff
      - py-mypy
      - py-test
      - ui-typecheck
      - ui-lint
      - ui-test
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required gate jobs failed or were cancelled."
            exit 1
          fi
          echo "All required gate jobs succeeded."
