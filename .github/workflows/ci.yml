name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Unified workspace gate. Each tool runs as its own job for parallelism. Commands
# here mirror the Makefile (`make lint` / `make test`) so CI cannot drift from
# local-dev. See docs/ci-status.md for per-job expectations.
jobs:
  # ---------------------------------------------------------------------------
  # Python plane (ruff / mypy / pytest split into parallel jobs)
  # ---------------------------------------------------------------------------
  py-ruff:
    name: py-ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: uv sync
        run: uv sync --all-packages --dev

      - name: ruff check
        run: uv run ruff check .

  py-mypy:
    name: py-mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf-compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: uv sync
        run: uv sync --all-packages --dev

      # Generated proto stubs are imported by the python plane; without them
      # mypy can't resolve corlinman_grpc symbols.
      - name: generate Python stubs
        run: bash scripts/gen-proto.sh

      - name: mypy
        run: uv run mypy .

  py-test:
    name: py-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf-compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: uv sync
        run: uv sync --all-packages --dev

      - name: generate Python stubs
        run: bash scripts/gen-proto.sh

      - name: pytest (non-live)
        run: uv run pytest -m "not live_llm and not live_transport"

  # ---------------------------------------------------------------------------
  # UI plane (typecheck / lint / test split into parallel jobs)
  # ---------------------------------------------------------------------------
  ui-typecheck:
    name: ui-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm 9
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store dir
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm -C ui typecheck

  ui-lint:
    name: ui-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm 9
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store dir
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm -C ui lint

  ui-test:
    name: ui-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm 9
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store dir
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: test
        run: pnpm -C ui test

  # ---------------------------------------------------------------------------
  # Auxiliary gates: run on every PR + push to main.
  # ---------------------------------------------------------------------------
  proto-sync:
    name: proto-sync (generated stubs committed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf-compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: uv sync
        run: uv sync --all-packages --dev

      - name: generate Python stubs
        run: bash scripts/gen-proto.sh

      # Scoped to the generated dir so unrelated dirty files in the workflow
      # runner (e.g. uv's .venv, pnpm cache) don't spuriously fail the job.
      - name: verify no drift
        run: git diff --exit-code python/packages/corlinman-grpc/src/corlinman_grpc/_generated/

  boundary-check:
    name: boundary-check (no cycles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf-compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: uv sync
        run: uv sync --all-packages --dev

      # Python plane layering contract — see .importlinter at repo root.
      - name: python import-linter
        run: uv run lint-imports

  # ---------------------------------------------------------------------------
  # Aggregator: a single required check that fans-in the core gate jobs so
  # branch protection only needs one rule.
  # ---------------------------------------------------------------------------
  gate:
    name: gate (all required checks)
    if: always()
    needs:
      - py-ruff
      - py-mypy
      - py-test
      - ui-typecheck
      - ui-lint
      - ui-test
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required gate jobs failed or were cancelled."
            exit 1
          fi
